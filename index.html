<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Туған күніңмен, Анашым ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff5f9,#ffe6ef);
font-family:'Montserrat',sans-serif;
}

.card{
text-align:center;
padding:40px;
background:rgba(255,255,255,.3);
backdrop-filter:blur(15px);
border-radius:30px;
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

img{
width:280px;
height:280px;
border-radius:50%;
object-fit:cover;
border:8px solid white;
box-shadow:0 0 30px rgba(255,105,180,.5);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

h1{
margin-top:25px;
font-size:48px;
font-family:'Playfair Display',serif;
color:#d63384;
}

p{
margin-top:20px;
font-size:22px;
color:#555;
line-height:1.7;
}

.heart{
position:fixed;
top:-30px;
font-size:24px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-30px);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>

</head>

<body>

<div class="card">

<img src="IMG_1690.jpg" alt="Анашым">

<h1>Туған күніңмен,<br>Анашым ❤️</h1>

<p>
Сізге зор денсаулық, ұзақ ғұмыр,<br>
бақыт пен қуаныш тілеймін.<br><br>

Мен сізді шексіз жақсы көремін! 💖
</p>

</div>

<script>

function heart(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},10000);

}

setInterval(heart,250);

</script>

</body>
</html>
