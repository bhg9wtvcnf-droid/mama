<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Туған күніңмен, Анашым ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Montserrat',sans-serif;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:linear-gradient(-45deg,#ffb7d5,#ffdcec,#fff4f8,#ffd1e7);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.card{

position:relative;

width:90%;

max-width:900px;

padding:60px;

text-align:center;

background:rgba(255,255,255,.25);

backdrop-filter:blur(20px);

border-radius:35px;

box-shadow:0 25px 70px rgba(0,0,0,.15);

border:1px solid rgba(255,255,255,.4);

z-index:2;

animation:show 1.8s;

}

@keyframes show{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.photo{

width:220px;

height:220px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:8px solid white;

box-shadow:0 0 35px rgba(255,192,203,.8);

}

.photo img{

width:100%;

height:100%;

object-fit:cover;

}

h1{

font-family:'Playfair Display',serif;

font-size:68px;

color:#d63384;

margin-top:25px;

}

.text{

margin-top:30px;

font-size:24px;

line-height:1.9;

color:#5f4550;

}

audio{

display:none;
.sakura{
position:fixed;
top:-50px;
font-size:22px;
pointer-events:none;
animation:fall linear infinite;
z-index:1;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>

</head>

<body>

<audio id="music" autoplay loop>
<source src="Dave ft. Tems Raindance.mp3" type="audio/mpeg">
</audio>

<div class="card">

<div class="photo">
<img src="IMG_6596.HEIC" alt="Анашым">
</div>

<h1>Туған күніңмен,<br>Анашым ❤️</h1>

<div class="text">

Анашым! 💖<br><br>

Туған күніңіз құтты болсын! 🌸<br><br>

Сізге зор денсаулық,
ұзақ ғұмыр,
шексіз бақыт,
береке,
махаббат
және барлық армандарыңыздың орындалуын тілеймін.<br><br>

Әр күніңіз қуанышқа,
жүрегіңіз жылулыққа,
ал өміріңіз бақытқа толы болсын.<br><br>

Мен сізді шексіз жақсы көремін! ❤️

</div>

</div>

<script>

const music=document.getElementById("music");

music.volume=0.6;

window.addEventListener("load",()=>{

music.play().catch(()=>{});

});

for(let i=0;i<40;i++){

const flower=document.createElement("div");

flower.className="sakura";

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=(6+Math.random()*6)+"s";

flower.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(flower);

}

setInterval(()=>{

const heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.bottom="-30px";
heart.style.fontSize=(18+Math.random()*20)+"px";
heart.style.pointerEvents="none";
heart.style.zIndex="3";

heart.animate([
{transform:"translateY(0)",opacity:0},
{opacity:1,offset:0.2},
{transform:"translateY(-120vh)",opacity:0}
],{
duration:7000,
iterations:1
});

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

},700);

</script>

</body>
</html>
