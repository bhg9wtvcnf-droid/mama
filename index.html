<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Туған күніңмен, Анашым ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(-45deg,#ff9fc7,#ffd4ea,#ffeccf,#ffc6df);

background-size:400% 400%;

animation:bg 12s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.card{

position:relative;

width:90%;

max-width:850px;

padding:50px;

border-radius:35px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.35);

box-shadow:0 25px 60px rgba(0,0,0,.2);

text-align:center;

animation:card 2s;

z-index:2;

}

@keyframes card{

from{

opacity:0;

transform:translateY(60px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.photo{

width:220px;

height:220px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:7px solid white;

box-shadow:0 0 45px rgba(255,192,203,.8);

animation:float 4s ease-in-out infinite;

}

.photo img{

width:100%;

height:100%;

object-fit:cover;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-12px);

}

}

h1{

font-family:'Great Vibes',cursive;

font-size:78px;

color:#ff2d6f;

margin-top:25px;

opacity:0;

animation:title 2s forwards;

animation-delay:.5s;

}

@keyframes title{

to{

opacity:1;

transform:translateY(0);

}

from{

opacity:0;

transform:translateY(40px);

}

}

.text{

margin-top:30px;

font-size:26px;

line-height:1.8;

color:#5d3d47;

opacity:0;

animation:text 2s forwards;

animation-delay:1.8s;

}

@keyframes text{

to{

opacity:1;

}

from{

opacity:0;

}

}

audio{

display:none;

}
  .sakura{
position:absolute;
top:-50px;
font-size:24px;
pointer-events:none;
animation:fall linear infinite;
z-index:1;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

.glow{
position:absolute;
width:300px;
height:300px;
border-radius:50%;
background:rgba(255,255,255,.25);
filter:blur(90px);
top:-100px;
right:-100px;
z-index:0;
}

.heart{
position:absolute;
color:#ff5c9d;
font-size:18px;
animation:heartUp 6s linear infinite;
pointer-events:none;
}

@keyframes heartUp{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="glow"></div>

<audio id="music" autoplay loop>
<source src="Dave ft. Tems Raindance.mp3" type="audio/mpeg">
</audio>

<div class="card">

<div class="photo">
<img src="IMG_6596.HEIC" alt="Анашым">
</div>

<h1>Туған күніңмен,<br>Анашым ❤️</h1>

<div class="text">
Анашым, туған күніңіз құтты болсын!<br><br>

Сізге зор денсаулық, ұзақ ғұмыр,
шексіз бақыт пен қуаныш тілеймін.<br><br>

Әр күніңіз күлкіге,
жүрегіңіз махаббатқа,
үйіңіз берекеге толы болсын.
<br><br>

Мен сізді шексіз жақсы көремін! ❤️

</div>

</div>

<script>

const music=document.getElementById("music");

window.onload=()=>{

music.play().catch(()=>{});

}

for(let i=0;i<35;i++){

let s=document.createElement("div");

s.className="sakura";

s.innerHTML="🌸";

s.style.left=Math.random()*100+"vw";

s.style.animationDuration=(6+Math.random()*6)+"s";

s.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(s);

}

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*20)+"px";

h.style.animationDuration=(5+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},8000);

},400);

</script>

</body>

</html>
