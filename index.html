<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Туған күніңмен, Анашым ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(160deg,#ffb6d9,#ffd8ec,#fff4f8);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Cormorant Garamond',serif;

}

body::before{

content:"";
position:absolute;
width:300%;
height:300%;
background:
radial-gradient(circle,#ffffff55 1px,transparent 1px);
background-size:60px 60px;
animation:bgMove 40s linear infinite;

}

@keyframes bgMove{

0%{
transform:translate(0,0);
}

100%{
transform:translate(-300px,-300px);
}

}

.card{

position:relative;
z-index:2;

width:90%;
max-width:850px;

background:rgba(255,255,255,.25);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.4);

padding:50px;

border-radius:35px;

box-shadow:0 20px 60px rgba(0,0,0,.18);

text-align:center;

animation:fade 2s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(50px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.photo{

width:230px;
height:230px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:8px solid white;

box-shadow:0 0 35px rgba(255,192,203,.8);

animation:float 4s ease-in-out infinite;

}

.photo img{

width:100%;
height:100%;
object-fit:cover;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

}

h1{

font-family:'Great Vibes',cursive;

font-size:72px;

color:#ff2f72;

margin-top:25px;

opacity:0;

animation:text1 2s forwards;
animation-delay:.8s;

}

@keyframes text1{

to{

opacity:1;
transform:translateY(0);

}

from{

opacity:0;
transform:translateY(30px);

}

}

p{

margin-top:30px;

font-size:28px;

color:#5d3a48;

line-height:1.8;

opacity:0;

animation:text2 2s forwards;

animation-delay:1.8s;

}

@keyframes text2{

to{

opacity:1;

}

from{

opacity:0;

}

}

audio{

display:none;

}

.sakura{

position:absolute;

top:-50px;

color:#ff8cb9;

font-size:24px;

animation:fall linear infinite;

}

@keyframes fall{

0%{

transform:translateY(-100px) rotate(0);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(110vh) rotate(360deg);

opacity:0;

}

}

</style>

</head>

<body>

<audio autoplay loop>
<source src="Dave ft. Tems Raindance.mp3" type="audio/mpeg">
</audio>

<div class="card">

<div class="photo">
<img src="IMG_6596.HEIC">
</div>

<h1>Туған күніңмен,<br>Анашым ❤️</h1>

<p>

Анашым...

Сіз менің өмірімдегі ең қымбат жансыз.

Әр күніңіз бақытқа,
махаббатқа,
денсаулыққа
және қуанышқа толы болсын.

Мен сізді шексіз жақсы көремін.

❤️

</p>

</div>

<script>

for(let i=0;i<40;i++){

let s=document.createElement("div");

s.className="sakura";

s.innerHTML="🌸";

s.style.left=Math.random()*100+"vw";

s.style.animationDuration=5+Math.random()*8+"s";

s.style.animationDelay=Math.random()*6+"s";

document.body.appendChild(s);

}

</script>

</body>
</html>
